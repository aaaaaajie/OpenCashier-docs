upstream opencashier_docs_upstream {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name opencashier-docs.linkmind.site;

    location / {
        proxy_pass http://opencashier_docs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}

# If this Nginx instance also handles HTTPS for the same domain, add a matching
# 443 server block and keep the same proxy_pass target.
