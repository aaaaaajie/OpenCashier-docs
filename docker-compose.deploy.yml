services:
  docs:
    image: ${IMAGE_NAME:-opencashier-docs}:${IMAGE_TAG:-local}
    container_name: ${CONTAINER_NAME:-opencashier-docs}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${DOCS_HOST_BIND:-0.0.0.0}:${DOCS_PORT:-3001}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
